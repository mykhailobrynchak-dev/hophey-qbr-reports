name: Оновлення QBR CAFE RYNOK

on:
  schedule:
    - cron: '0 5 * * 1'  # Понеділок 05:00 UTC = 07:00 Київ (літній час)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cafe-rynok
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install databricks-sql-connector>=3.1.0

      - name: Fetch data and generate report
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: python generate_report.py

      - name: Commit and push report
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cafe-rynok/index.html cafe-rynok/report_data.json
          git diff --cached --quiet || git commit -m "CAFE RYNOK: щотижневе оновлення $(date +'%Y-%m-%d')"
          git push
